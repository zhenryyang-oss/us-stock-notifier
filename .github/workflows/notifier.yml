name: US Stock Notifier

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "*/30 4-19 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run notifier
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
        run: |
          python3 us_stock_daily.py
